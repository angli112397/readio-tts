name: readio-tts

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      READIO_PROVIDER: ${READIO_PROVIDER:-gpt}
      READIO_STORAGE_DIR: /app/data/jobs
      READIO_MAX_CHAPTER_CHARACTERS: ${READIO_MAX_CHAPTER_CHARACTERS:-200000}
      READIO_SENTENCE_GAP_MS: ${READIO_SENTENCE_GAP_MS:-600}
      READIO_JOB_RETENTION_DAYS: ${READIO_JOB_RETENTION_DAYS:-7}
      READIO_AUDIO_URL_SIGNING_KEY: ${READIO_AUDIO_URL_SIGNING_KEY:-replace-for-non-local-use}
      READIO_GPT_BASE_URL: ${READIO_GPT_BASE_URL:-http://gpt-sovits:9880}
      READIO_GPT_TIMEOUT_SECONDS: ${READIO_GPT_TIMEOUT_SECONDS:-300}
      READIO_GPT_REFERENCE_DIR: /app/references/gpt
      READIO_GPT_DEFAULT_REFERENCE_ID: ${READIO_GPT_DEFAULT_REFERENCE_ID:-}
      READIO_GPT_TEXT_LANG: ${READIO_GPT_TEXT_LANG:-zh}
      READIO_GPT_PROMPT_LANG: ${READIO_GPT_PROMPT_LANG:-zh}
      READIO_GPT_TEXT_SPLIT_METHOD: ${READIO_GPT_TEXT_SPLIT_METHOD:-cut0}
      READIO_GPT_BATCH_SIZE: ${READIO_GPT_BATCH_SIZE:-1}
      READIO_GPT_TOP_K: ${READIO_GPT_TOP_K:-15}
      READIO_GPT_TOP_P: ${READIO_GPT_TOP_P:-1.0}
      READIO_GPT_TEMPERATURE: ${READIO_GPT_TEMPERATURE:-1.0}
      READIO_GPT_SPEED_FACTOR: ${READIO_GPT_SPEED_FACTOR:-1.0}
      READIO_GPT_FRAGMENT_INTERVAL: ${READIO_GPT_FRAGMENT_INTERVAL:-0.3}
      READIO_GPT_SEED: ${READIO_GPT_SEED:--1}
    ports:
      - "${READIO_GATEWAY_BIND:-0.0.0.0}:${READIO_GATEWAY_PORT:-8090}:8090"
    volumes:
      - jobs:/app/data/jobs
      - ./references/gpt:/app/references/gpt
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - ingress

networks:
  backend:
    internal: true
  ingress:

volumes:
  jobs:
