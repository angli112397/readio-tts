services:
  gpt-sovits:
    image: ${READIO_GPT_IMAGE:-xxxxrt666/gpt-sovits:cu126-lite-20250616-7dec5f}
    restart: unless-stopped
    init: true
    working_dir: /workspace/GPT-SoVITS
    shm_size: "16g"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 9880), timeout=5).close()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    configs:
      - source: gpt_start_api
        target: /run/readio/start-api.sh
      - source: gpt_tts_config
        target: /run/readio/tts_infer.yaml
    volumes:
      - ${READIO_GPT_MODELS_DIR:?Set READIO_GPT_MODELS_DIR to the local GPT-SoVITS model folder}:/workspace/GPT-SoVITS/GPT_SoVITS/pretrained_models:ro
      - ${READIO_DATA_DIR:?Set READIO_DATA_DIR to a local non-synchronized folder}/jobs:/var/lib/readio/jobs:ro
    command: ["bash", "/run/readio/start-api.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend

  gateway:
    depends_on:
      gpt-sovits:
        condition: service_healthy

  worker:
    depends_on:
      gpt-sovits:
        condition: service_healthy

configs:
  gpt_start_api:
    file: ./deployment/gpt_sovits/start-api.sh
  gpt_tts_config:
    file: ./deployment/gpt_sovits/tts_infer.yaml
