services:
  gpt-sovits:
    image: ${READIO_GPT_IMAGE:-xxxxrt666/gpt-sovits:cu126-lite-20250616-7dec5f}
    restart: unless-stopped
    init: true
    working_dir: /workspace/GPT-SoVITS
    environment:
      is_half: "true"
    shm_size: "16g"
    tty: true
    stdin_open: true
    volumes:
      - ./GPT-SoVITS:/workspace/GPT-SoVITS/GPT_SoVITS/pretrained_models
      - ./deployment/gpt_sovits/tts_infer.yaml:/run/readio/tts_infer.yaml:ro
      - ./deployment/gpt_sovits/start-api.sh:/run/readio/start-api.sh:ro
      - ${READIO_DATA_DIR:?Set READIO_DATA_DIR to a local non-synchronized folder}:/workspace/GPT-SoVITS/job-data:ro
    ports:
      - "${READIO_GPT_BIND:-127.0.0.1}:9880:9880"
    command: ["bash", "/run/readio/start-api.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend
      - ingress

  gateway:
    depends_on:
      gpt-sovits:
        condition: service_started

  worker:
    depends_on:
      gpt-sovits:
        condition: service_started
